version: '3.8'

services:
  backend:
    build:
      context: ./dentvision-backend
      dockerfile: Dockerfile
    container_name: dentvision-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:80}
      - PORT=3001
      - REDIS_URL=${REDIS_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - dentvision

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dentvision-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dentvision

networks:
  dentvision:
    driver: bridge
