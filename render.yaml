# DentVision — Render Blueprint
#
# IMPORTANT: Render Dashboard Build/Start override this file unless you
# sync from Blueprint. Current live service uses:
#   Build: cd dentvision-backend && npm install && npx prisma generate && npx prisma db push --accept-data-loss
#   Start: cd dentvision-backend && npx tsx src/index.ts
#
# Those commands are supported: dentvision-backend postinstall installs /server,
# prisma points at ../prisma/schema.prisma, and src/index.ts launches /server.
#
# Preferred (once you update Dashboard):
#   Build: cd server && npm install && npm run render:build
#   Start: cd server && npm run render:start

services:
  - type: web
    name: dentvision-api
    runtime: node
    plan: free
    buildCommand: cd dentvision-backend && npm install && npx prisma generate --schema ../prisma/schema.prisma && npx prisma db push --accept-data-loss --schema ../prisma/schema.prisma
    startCommand: cd dentvision-backend && npx tsx src/index.ts
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: "*"
