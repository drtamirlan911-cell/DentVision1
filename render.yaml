services:
  - type: web
    name: dentvision-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate --schema ../prisma/schema.prisma && npx prisma db push --accept-data-loss --schema ../prisma/schema.prisma
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: "*"
